<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reel Portfolio</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .reel-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 100vh;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      background: black;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .text-box {
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      color: white;
      font-size: 18px;
      line-height: 1.5;
      text-align: center;
    }

    .start-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 20px;
      font-size: 16px;
      background: #ffffff;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>

<body>

  <div class="reel-container">
    <div class="slide" id="slide"
      style="background-image: url('images/img1.jpg');">
      
      <div class="text-box" id="textBox">
        प्रारंभ करने के लिए बटन दबाएँ
      </div>

      <button class="start-btn" id="startBtn">
        ▶ शुरू करें
      </button>

    </div>
  </div>

  <!-- Script जोड़ना बहुत जरूरी -->
  <script src="script.js"></script>

</body>
</html>
