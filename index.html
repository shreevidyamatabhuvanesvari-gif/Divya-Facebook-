<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Creator</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 10px;
}

/* INPUTS */
input, textarea {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
}

/* PREVIEW AREA */
.preview {
  position: relative;
  width: 100%;
  aspect-ratio: 9 / 16;
  background: black;
  overflow: hidden;
  border-radius: 10px;
}

/* IMAGE */
.preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

/* TEXT BOX */
.text-box {
  position: absolute;
  bottom: 130px; /* 🔥 पहले 0 था, अब थोड़ा ऊपर */
  width: 100%;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
  color: white;
  text-align: center;
  font-size: 20px;
  line-height: 1.6;

  white-space: normal;
  word-break: break-word;
}

/* PLAY BUTTON */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 26px;
  padding: 12px 18px;
  border: none;
  border-radius: 50%;
  background: white;
  color: black;
  cursor: pointer;
  z-index: 2;
}
</style>
</head>

<body>

<div class="container">

<!-- IMAGE UPLOAD -->
<input type="file" id="fileInput" accept="image/*">

<!-- TEXT INPUT -->
<textarea id="textInput" placeholder="यहाँ अपना लेख लिखें..."></textarea>

<!-- PREVIEW -->
<div class="preview">

  <!-- IMAGE -->
  <img id="img">

  <!-- TEXT -->
  <div class="text-box" id="textBox"></div>

  <!-- PLAY BUTTON -->
  <button id="playBtn" class="play-btn">▶</button>

</div>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
