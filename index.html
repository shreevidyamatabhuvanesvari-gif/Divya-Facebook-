<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Creator</title>

<style>
body {
  margin:0;
  background:black;
  font-family:sans-serif;
}

.container {
  max-width:420px;
  margin:auto;
}

input, textarea {
  width:100%;
  margin:10px 0;
  padding:10px;
  font-size:16px;
}

button {
  width:100%;
  padding:12px;
  font-size:16px;
}

.preview {
  position:relative;
  width:100%;
  aspect-ratio:9/16;
  background:black;
  overflow:hidden;
}

.preview img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.text-box {
  position:absolute;
  bottom:0;
  width:100%;
  padding:20px;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  color:white;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<input type="file" id="imageInput" accept="image/*">
<textarea id="textInput" placeholder="यहाँ अपना लेख लिखें..."></textarea>
<button onclick="generate()">Preview बनाएं</button>

<div class="preview">
  <img id="previewImage">
  <div class="text-box" id="previewText"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
